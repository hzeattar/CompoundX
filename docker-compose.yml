version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: compoundx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-compoundx_platform}
      POSTGRES_USER: ${DB_USERNAME:-compoundx}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-compoundx}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: compoundx-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:RELEASE.2026-03-13T11-33-47Z
    container_name: compoundx-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  mailpit:
    image: axllent/mailpit:v1.22
    container_name: compoundx-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  redis_data:
  minio_data:
